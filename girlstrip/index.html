<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Girls Trip · May 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500;1,600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<style>
:root {
  --bg: #111111;
  --surface: #FFFFFF;
  --ink: #0a0a0a;
  --ink-2: #3a3a3a;
  --ink-3: #717171;
  --ink-4: #c0c0c0;
  --border: #EEEEEE;
  --border-2: #D0D0D0;
  --hero-bg: #111111;
  --nav-h: 58px;
  --athens-color: #8C7455;
  --paros-color: #3B8FA3;
  --travel-color: #9A9A9A;
  --heading: "Cormorant Garamond", Georgia, serif;
  --body: "Jost", Helvetica, Arial, sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--body);
  font-weight: 300;
  font-size: 14px;
  line-height: 1.65;
  color: var(--ink-3);
  background: var(--bg);
  margin: 0;
}

/* ━━━━ HERO (black) ━━━━ */
.hero {
  background: var(--hero-bg);
  padding: 52px 0 0;
}
.hero-inner {
  max-width: 900px;
  margin: 0 auto;
  padding: 0 56px;
  text-align: center;
}
.hero-rule { margin-left: auto; margin-right: auto; }
.hero-pills { justify-content: center; }
.hero-eyebrow {
  font-family: var(--body); font-size: 9px; font-weight: 500;
  letter-spacing: 0.25em; text-transform: uppercase;
  color: #555; margin-bottom: 14px;
}
.hero-title {
  font-family: var(--heading); font-size: 42px; font-weight: 300;
  font-style: italic; color: #fff; letter-spacing: -0.01em;
  line-height: 1.0; margin-bottom: 4px; white-space: nowrap;
}
.hero-title span { font-weight: 400; }
.hero-subtitle {
  font-family: var(--heading); font-size: 18px; font-weight: 300;
  font-style: italic; color: #666; letter-spacing: 0.02em; margin-bottom: 0;
  padding-bottom: 20px;
}
.hero-rule { width: 32px; height: 1px; background: #333; margin-bottom: 22px; }
.hero-pills { display: none; }
.hero-pill {
  font-family: var(--body); font-size: 9px; font-weight: 500;
  letter-spacing: 0.16em; text-transform: uppercase;
  padding: 0 20px 0 0; color: #555;
}
.hero-pill + .hero-pill { border-left: 1px solid #222; padding-left: 20px; }
.hero-pill strong { color: #ccc; font-weight: 500; }

/* ━━━━ TOP NAV ━━━━ */
.top-nav {
  position: sticky; position: -webkit-sticky; top: 0; z-index: 300;
  background: #111111; border-bottom: none;
  height: var(--nav-h);
  width: 100%;
  overflow: hidden;
}
.top-nav-wrap {
  display: flex; align-items: stretch; justify-content: center;
  max-width: 900px;
  margin: 0 auto;
  height: 100%;
}
.top-nav-inner {
  display: flex; align-items: stretch;
  overflow-x: scroll; scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
  height: 100%;
}
.top-nav-inner::-webkit-scrollbar { display: none; }
.top-nav-day {
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px;
  padding: 0 14px; cursor: pointer; white-space: nowrap;
  border-right: 1px solid #222;
  transition: background 0.12s; flex-shrink: 0;
  position: relative;
}
.top-nav-day:hover { background: #1a1a1a; }
.top-nav-day.active { background: #1a1a1a; }
.top-nav-day.active::after {
  content: ''; position: absolute; bottom: 0; left: 0; right: 0;
  height: 2px; background: var(--ink);
}
.top-nav-day.active.phase-athens::after { background: var(--athens-color); }
.top-nav-day.active.phase-paros::after  { background: var(--paros-color); }
.top-nav-num  { font-family: var(--body); font-size: 9px; font-weight: 600; letter-spacing: 0.1em; color: #666; }
.top-nav-date { font-family: var(--body); font-size: 10px; font-weight: 400; color: #888; }
.top-nav-day.active .top-nav-num,
.top-nav-day.active .top-nav-date { color: #ccc; }

/* ━━━━ MAIN ━━━━ */
.main-wrap { max-width: 900px; margin: 0 auto; width: 100%; }

/* ━━━━ SECTION ━━━━ */
.section-hd { padding: 40px 40px 0; }
.section-rule { width: 32px; height: 1px; background: var(--border-2); margin-bottom: 12px; }
.section-label {
  font-family: var(--body); font-size: 9px; font-weight: 600;
  letter-spacing: 0.22em; text-transform: uppercase; color: var(--ink-4); margin-bottom: 8px;
}
.section-title {
  font-family: var(--heading); font-size: 30px; font-weight: 400;
  color: var(--ink); letter-spacing: -0.01em;
}

/* ━━━━ DAY CARDS ━━━━ */
#days-container { padding: 32px 40px 70vh; display: flex; flex-direction: column; gap: 24px; }

.day-section {
  background: var(--surface);
  border: none;
  overflow: hidden;
  isolation: isolate;
  scroll-margin-top: calc(var(--nav-h) + 16px);
  box-shadow: 0 2px 12px rgba(0,0,0,0.15);
}

.day-topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 24px; background: #fff;
  border-bottom: 1px solid var(--border);
}
.day-topbar-left { display: flex; align-items: center; gap: 12px; }
.day-counter {
  font-family: var(--body); font-size: 9px; font-weight: 600;
  letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-4);
}
.day-counter-sep { width: 3px; height: 3px; border-radius: 50%; background: var(--border-2); }
.day-weekdate { font-family: var(--body); font-size: 10px; font-weight: 400; letter-spacing: 0.06em; color: var(--ink-3); }
.day-phase-tag {
  font-family: var(--body); font-size: 8px; font-weight: 600;
  letter-spacing: 0.2em; text-transform: uppercase;
  padding: 3px 8px; border: 1px solid var(--border); color: var(--ink-4);
}
.phase-athens .day-phase-tag { color: var(--athens-color); border-color: var(--athens-color); }
.phase-paros  .day-phase-tag { color: var(--paros-color);  border-color: var(--paros-color); }

/* ━━━━ WEATHER BAR ━━━━ */
.day-weather {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 24px;
  border-bottom: 1px solid var(--border);
  background: #fff;
  font-family: var(--body);
  flex-wrap: wrap;
}
.day-weather.loading { color: var(--ink-4); font-size: 10px; letter-spacing: 0.08em; }
.wx-icon { font-size: 16px; line-height: 1; }
.wx-temps {
  display: flex; align-items: baseline; gap: 4px;
  font-size: 13px; font-weight: 400; color: var(--ink-2);
}
.wx-hi { font-weight: 500; }
.wx-lo { color: var(--ink-4); }
.wx-sep { color: var(--border-2); font-size: 10px; }
.wx-desc {
  font-size: 10px; font-weight: 400; letter-spacing: 0.06em;
  text-transform: uppercase; color: var(--ink-3);
}
.wx-forecast-label {
  font-size: 9px; font-weight: 500; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--ink-3); opacity: 0.7;
}
.wx-current {
  display: flex; align-items: center; gap: 6px;
  font-size: 11px; color: var(--ink-3);
}
.wx-current-label {
  font-size: 9px; font-weight: 500; letter-spacing: 0.1em;
  text-transform: uppercase; opacity: 0.7;
}
.wx-divider { color: var(--border-2); font-size: 11px; }
.wx-unavail {
  font-size: 10px; font-weight: 400; letter-spacing: 0.06em;
  text-transform: uppercase; color: var(--ink-4);
}

.day-headline {
  padding: 24px 24px 20px;
  display: flex; align-items: flex-start; justify-content: space-between;
}
.day-title {
  font-family: var(--heading); font-size: 26px; font-weight: 500;
  font-style: normal; letter-spacing: -0.01em; color: var(--ink);
  margin-bottom: 6px; line-height: 1.15;
}
.day-subtitle {
  font-family: var(--body); font-size: 10px; font-weight: 400;
  letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-4);
}
.day-num-bg {
  font-family: var(--heading); font-size: 60px; font-weight: 300;
  color: var(--border); letter-spacing: -0.04em; line-height: 1;
  flex-shrink: 0; user-select: none;
}

.day-body-wrap { position: relative; }
.day-body { border-top: 1px solid var(--border); }

.day-sched-label {
  font-family: var(--body); font-size: 8px; font-weight: 600;
  letter-spacing: 0.2em; text-transform: uppercase; color: var(--ink-4);
  padding: 10px 24px 0;
}

.day-content-col { margin-right: 200px; }
.schedule { display: flex; flex-direction: column; }

.day-map-float {
  position: absolute; top: 0; right: 0; bottom: 0; width: 200px;
  border-left: 1px solid var(--border);
}
.day-map-float .day-map { width: 100%; height: 100%; min-height: 160px; }
.day-map-float .map-open-btn {
  position: absolute; bottom: 8px; right: 8px;
  font-family: var(--body); font-size: 9px; font-weight: 600;
  letter-spacing: 0.1em; text-transform: uppercase;
  background: rgba(255,255,255,.92); border: 1px solid var(--border);
  padding: 3px 8px; cursor: pointer; color: var(--ink-3);
}
.schedule-row {
  display: flex; gap: 16px; padding: 12px 24px;
  border-bottom: 1px solid var(--border); align-items: flex-start;
}
.schedule-row:last-child { border-bottom: none; }
.sched-time {
  font-family: var(--body); font-size: 9px; font-weight: 600;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--ink-4); min-width: 80px; flex-shrink: 0; padding-top: 2px;
}
.sched-main { flex: 1; min-width: 0; }
.sched-main strong { font-weight: 400; font-size: 13px; color: var(--ink-2); display: block; }
.sched-note { font-size: 11px; color: var(--ink-4); display: block; margin-top: 3px; font-weight: 300; line-height: 1.5; }
.flight-row { background: #fff; }
.flight-row .sched-time { color: var(--ink-2); }
.flight-row .sched-main strong { font-weight: 500; }


.day-accom {
  display: flex; align-items: center; flex-wrap: wrap; gap: 8px;
  padding: 14px 24px; border-top: 1px solid var(--border);
  background: #fff;
}
.day-accom.has-modal { cursor: pointer; transition: background 0.12s; }
.day-accom.has-modal:hover { background: #F3F2EF; }
.accom-status-text {
  font-family: var(--body); font-size: 8px; font-weight: 600;
  letter-spacing: 0.18em; text-transform: uppercase;
  padding: 2px 6px; border: 1px solid;
  position: relative; top: -1px;
}
.booked .accom-status-text { color: #3a7a50; border-color: #b8ddc8; background: #f0faf4; }
.book   .accom-status-text { color: #a04030; border-color: #e8c0ba; background: #fdf5f4; }
.na     .accom-status-text { display: none; }
.accom-sep   { color: var(--border-2); }
.accom-label {
  font-family: var(--body); font-size: 9px; font-weight: 600;
  letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-4);
}
.accom-name  { font-family: var(--body); font-size: 13px; font-weight: 300; color: var(--ink-2); flex: 1 0 100%; }
.accom-note  { font-size: 11px; color: var(--ink-4); flex: 1 0 100%; margin-top: 2px; }
/* ━━━━ RECS BAR ━━━━ */
.recs-bar {
  display: flex; align-items: center; gap: 8px;
  padding: 12px 24px; cursor: pointer; user-select: none;
  border-top: 1px solid var(--border);
  background: #EDEDEC; transition: background 0.12s;
}
.recs-bar:hover { background: #E4E4E2; }
.recs-bar.open { background: #E4E4E2; }
.recs-bar-icon {
  font-size: 16px; line-height: 1; color: var(--ink-3);
  transition: transform 0.25s ease;
  display: inline-block;
}
.recs-bar.open .recs-bar-icon { transform: rotate(90deg); }
.recs-bar-label {
  font-family: var(--body); font-size: 9px; font-weight: 600;
  letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-3);
}
.recs-bar-arrow { display: none; }

/* ━━━━ DETAILS LINK ━━━━ */
.accom-details-link {
  font-family: var(--body); font-size: 11px; font-weight: 400;
  color: var(--ink-3); cursor: pointer;
  border-bottom: 1px solid var(--border-2);
  transition: color 0.12s, border-color 0.12s;
}
.accom-details-link:hover { color: var(--ink); border-color: var(--ink-3); }

/* ━━━━ DETAILS PANEL ━━━━ */
.details-panel {
  overflow: hidden; height: 0; opacity: 0;
  border-top: 0 solid var(--border);
  transition: height 0.35s cubic-bezier(0.4, 0, 0.2, 1),
              opacity 0.25s ease;
}
.details-panel.open {
  opacity: 1;
  border-top-width: 1px;
}
.details-row {
  display: flex; gap: 14px; padding: 11px 24px;
  border-bottom: 1px solid var(--border); align-items: flex-start;
  transform: translateY(-6px); opacity: 0;
  transition: transform 0.3s ease, opacity 0.3s ease;
}
.details-panel.open .details-row {
  transform: translateY(0); opacity: 1;
}
.details-panel.open .details-row:nth-child(1) { transition-delay: 0.05s; }
.details-panel.open .details-row:nth-child(2) { transition-delay: 0.1s; }
.details-panel.open .details-row:nth-child(3) { transition-delay: 0.15s; }
.details-panel.open .details-row:nth-child(4) { transition-delay: 0.2s; }
.details-panel.open .details-row:nth-child(5) { transition-delay: 0.25s; }
.details-row:last-child { border-bottom: none; }
.details-icon { font-size: 14px; flex-shrink: 0; width: 20px; text-align: center; padding-top: 1px; }
.details-cell { flex: 1; }
.details-lbl {
  font-family: var(--body); font-size: 8px; font-weight: 600;
  letter-spacing: 0.2em; text-transform: uppercase; color: var(--ink-4); margin-bottom: 3px;
}
.details-val { font-size: 13px; color: var(--ink-2); font-weight: 300; line-height: 1.5; }
.details-val a { color: var(--ink); text-decoration: underline; text-underline-offset: 2px; }

/* ━━━━ RESPONSIVE ━━━━ */
@media (max-width: 768px) {
  .hero { padding: 36px 24px 18px; }
  .hero-title { font-size: 32px; white-space: normal; }
  .hero-subtitle { font-size: 15px; }
  .hero-pills { display: none; }
  .section-hd { padding: 28px 20px 0; }
  #days-container { padding: 16px 12px 70vh; }
  #days-container { padding: 20px 16px 70vh; gap: 20px; }
  .day-map-float { display: none; }
  .day-content-col { margin-right: 0; }
  .day-headline { padding: 20px 16px 16px; }
  .day-num-bg { font-size: 44px; }
  .day-title { font-size: 20px; }
  .day-sched-label { padding: 10px 16px 0; }
  .schedule-row { padding: 11px 16px; }
  .day-topbar { padding: 8px 16px; }
  .day-weather { padding: 8px 16px; }
  .wx-temps { font-size: 14px; }
  .wx-desc { font-size: 12px; }
  .wx-unavail { font-size: 12px; }
  .wx-icon { font-size: 18px; }
  .day-accom { padding: 12px 16px; flex-wrap: wrap; }
  .day-section { max-width: 100%; }
  .sched-time { min-width: 64px; }
  .sched-main strong, .sched-note { word-break: break-word; }
  .top-nav-day { padding: 0 14px; }
  #pw-row { flex-direction: column; gap: 10px; }
  #pw-input { width: 220px; max-width: 80vw; }
  #pw-submit { padding: 12px 28px; height: 44px; }
  .recs-bar { padding: 12px 16px; }
  .recs-tabs { padding: 0 16px; }
  .recs-tab-content { padding: 14px 16px 18px; }
  .details-row { padding: 11px 16px; }
  body { font-size: 16px; color: #555; }
  .hero-eyebrow { font-size: 11px; }
  .day-counter { font-size: 11px; }
  .day-weekdate { font-size: 13px; color: #555; }
  .day-phase-tag { font-size: 11px; }
  .day-title { font-size: 24px; }
  .day-subtitle { font-size: 13px; color: #888; }
  .sched-time { font-size: 12px; color: #888; }
  .sched-main strong { font-size: 16px; }
  .sched-note { font-size: 14px; color: #777; }
  .accom-status-text { font-size: 11px; }
  .accom-label { font-size: 12px; color: #888; }
  .accom-name { font-size: 16px; }
  .accom-note { font-size: 14px; color: #777; }
  .recs-bar-label { font-size: 12px; }
  .accom-details-link { font-size: 14px; }
  .accom-sep { color: #999; }
  .details-lbl { font-size: 11px; }
  .details-val { font-size: 14px; }
  .details-icon { font-size: 16px; }
  .recs-tab { font-size: 12px; }
  .top-nav-num { font-size: 12px; }
  .top-nav-date { font-size: 13px; }
  .rec-name { font-size: 16px; }
  .rec-note { font-size: 14px; color: #777; }
  .day-counter-sep { background: #999; }
}

/* ━━━━ PASSWORD GATE ━━━━ */
#pw-gate {
  position: fixed; inset: 0; z-index: 9999;
  background: #111111;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 20px;
  overflow: hidden;
  min-height: 100vh; min-height: 100dvh;
}
#pw-gate-title {
  font-family: var(--heading); font-size: 36px; font-weight: 300;
  font-style: italic; color: #fff; letter-spacing: -0.01em;
}
#pw-gate-form { display: flex; flex-direction: column; align-items: center; gap: 12px; }
#pw-row { display: flex; align-items: stretch; gap: 12px; max-width: 90vw; }
#pw-input {
  background: transparent; border: 1px solid #444;
  color: #fff; font-family: var(--body); font-size: 16px; font-weight: 300;
  letter-spacing: 0.12em; text-align: center; padding: 9px 20px;
  width: 220px; max-width: 60vw; outline: none;
}
#pw-input::placeholder { color: #555; letter-spacing: 0.18em; text-transform: uppercase; font-size: 10px; }
#pw-error {
  font-family: var(--body); font-size: 10px; letter-spacing: 0.12em;
  text-transform: uppercase; color: #c0392b; display: none;
}
#pw-submit {
  background: transparent; border: 1px solid #444; color: #aaa;
  font-family: var(--body); font-size: 9px; font-weight: 500;
  letter-spacing: 0.2em; text-transform: uppercase;
  padding: 0 28px; cursor: pointer; align-self: stretch;
  transition: border-color 0.15s, color 0.15s;
}
#pw-submit:hover { border-color: #aaa; color: #fff; }

/* ━━━━ RECOMMENDATIONS ━━━━ */
.recs-panel {
  overflow: hidden; height: 0; opacity: 0;
  border-top: 0 solid var(--border);
  transition: height 0.35s cubic-bezier(0.4, 0, 0.2, 1),
              opacity 0.25s ease;
}
.recs-panel.open {
  opacity: 1;
  border-top-width: 1px;
}

.recs-tabs {
  display: flex; overflow-x: auto; scrollbar-width: none;
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  transform: translateY(-4px); opacity: 0;
  transition: transform 0.25s ease 0.05s, opacity 0.25s ease 0.05s;
}
.recs-panel.open .recs-tabs {
  transform: translateY(0); opacity: 1;
}
.recs-tabs::-webkit-scrollbar { display: none; }
.recs-tab {
  font-family: var(--body); font-size: 9px; font-weight: 600;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--ink-4); padding: 10px 14px 8px;
  cursor: pointer; white-space: nowrap; flex-shrink: 0;
  border-bottom: 2px solid transparent;
  transition: color 0.12s, border-color 0.12s;
}
.recs-tab:hover { color: var(--ink-3); }
.recs-tab.active { color: var(--ink-2); border-bottom-color: var(--ink); }

.recs-tab-content { display: none; padding: 16px 24px 20px; }
.recs-tab-content.active { display: block; }

.rec-list { display: flex; flex-direction: column; gap: 10px; }
.rec-item {
  display: flex; gap: 10px; align-items: flex-start;
  transform: translateY(-6px); opacity: 0;
  transition: transform 0.3s ease, opacity 0.3s ease;
}
.recs-panel.open .rec-item {
  transform: translateY(0); opacity: 1;
}
.recs-panel.open .rec-item:nth-child(1) { transition-delay: 0.05s; }
.recs-panel.open .rec-item:nth-child(2) { transition-delay: 0.1s; }
.recs-panel.open .rec-item:nth-child(3) { transition-delay: 0.15s; }
.recs-panel.open .rec-item:nth-child(4) { transition-delay: 0.2s; }
.recs-panel.open .rec-item:nth-child(5) { transition-delay: 0.25s; }
.recs-panel.open .rec-item:nth-child(6) { transition-delay: 0.3s; }
.rec-dot {
  width: 4px; height: 4px; border-radius: 50%;
  background: var(--ink-4); flex-shrink: 0; margin-top: 7px;
}
.rec-body { flex: 1; min-width: 0; }
.rec-name {
  font-family: var(--body); font-size: 13px; font-weight: 400; color: var(--ink-2);
  line-height: 1.4;
}
.rec-name a {

    var pts = d.date.split(" ");
    el.innerHTML = '<span class="top-nav-num">' + String(d.num).padStart(2,"0") + '</span>'
      + '<span class="top-nav-date">' + pts[1] + ' ' + pts[2] + '</span>';
    c.appendChild(el);
  });
}

function buildDays() {
  var MDATA = {};
  var c = document.getElementById("days-container");
  DAYS.forEach(function(d) {
    var p = PM[d.phase] || PM.travel;
    var st = SM[d.accom.status] || SM.na;
    MDATA["map-" + d.id] = d.markers;
    var rows = d.schedule.map(function(s) {
      var isFlight = s.time.match(/^\d{2}:\d{2}$/) || s.desc.toLowerCase().indexOf('airline') > -1 || s.desc.toLowerCase().indexOf('depart') > -1 || s.desc.toLowerCase().indexOf('arrive') > -1;
      return '<div class="schedule-row' + (isFlight ? ' flight-row' : '') + '">'
        + '<div class="sched-time">' + s.time + '</div>'
        + '<div class="sched-main"><strong>' + s.desc + '</strong>'
        + (s.note ? '<span class="sched-note">' + s.note + '</span>' : '')
        + '</div></div>';
    }).join("");
    c.innerHTML += '<section class="day-section ' + p.cls + '" id="' + d.id + '">'
      + '<div class="day-topbar">'
        + '<div class="day-topbar-left">'
          + '<span class="day-counter">Day ' + String(d.num).padStart(2,"0") + ' / 9</span>'
          + '<span class="day-counter-sep"></span>'
          + '<span class="day-weekdate">' + d.date + '</span>'
        + '</div>'
        + '<span class="day-phase-tag">' + p.tag + '</span>'
      + '</div>'
      + '<div class="day-weather loading" id="wx-' + d.id + '">Loading weather…</div>'
      + '<div class="day-headline">'
        + '<div>'
          + '<div class="day-title">' + d.title + '</div>'
          + '<div class="day-subtitle">' + d.subtitle + '</div>'
        + '</div>'
        + '<div class="day-num-bg">' + String(d.num).padStart(2,"0") + '</div>'
      + '</div>'
      + '<div class="day-body-wrap">'
        + '<div class="day-body" style="border-top:1px solid var(--border)">'
          + '<div class="day-content-col">'
            + '<div class="day-sched-label">Schedule</div>'
            + '<div class="schedule">' + rows + '</div>'
            + (function(){
                var cats = d.recs ? Object.keys(d.recs) : [];
                var total = 0; cats.forEach(function(c){ total += d.recs[c].length; });
                if (!total) return '';
                var html = '<div class="recs-bar" onclick="toggleRecsPanel(this)">'
                  + '<span class="recs-bar-icon">›</span>'
                  + '<span class="recs-bar-label">Recommendations</span>'
                  + '<span class="recs-bar-arrow">▾</span>'
                  + '</div>';
                html += '<div class="recs-panel"><div class="recs-panel-inner"><div class="recs-tabs">';
                cats.forEach(function(c, i){
                  html += '<span class="recs-tab' + (i===0?' active':'') + '" data-tab="' + d.id + '-' + i + '" onclick="switchRecTab(this)">' + c + '</span>';
                });
                html += '</div>';
                cats.forEach(function(c, i){
                  html += '<div class="recs-tab-content' + (i===0?' active':'') + '" id="rtc-' + d.id + '-' + i + '">';
                  html += '<div class="rec-list">';
                  d.recs[c].forEach(function(r){
                    html += '<div class="rec-item"><span class="rec-dot"></span><div class="rec-body">';
                    html += '<div class="rec-name">' + (r.url ? '<a href="' + r.url + '" target="_blank">' + r.name + '</a>' : r.name) + '</div>';
                    if (r.note) html += '<div class="rec-note">' + r.note + '</div>';
                    html += '</div></div>';
                  });
                  html += '</div></div>';
                });
                html += '</div></div>';
                return html;
              }())
          + '</div>'
        + '</div>'
        + '<div class="day-map-float">'
          + '<div class="day-map" id="map-' + d.id + '" data-lat="' + d.lat + '" data-lng="' + d.lng + '" data-zoom="' + d.zoom + '" style="cursor:pointer" onclick="openGoogleMaps(' + d.lat + ',' + d.lng + ')"></div>'
          + '<span class="map-open-btn" onclick="openGoogleMaps(' + d.lat + ',' + d.lng + ')">&#8599;&nbsp;Expand</span>'
        + '</div>'
      + '</div>'
      + '<div class="day-accom ' + st.c + '">'
      + (d.accom.label ? '<span class="accom-label">' + d.accom.label + '</span><span class="accom-status-text">' + st.text + '</span>' : '')
      + (d.accom.name  ? '<span class="accom-name">' + d.accom.name + '</span>' : '')
      + (d.accom.note  ? '<span class="accom-note">' + d.accom.note
          + (d.accom.key ? ' · <span class="accom-details-link" onclick="toggleDetailsPanel(this)" data-key="' + d.accom.key + '">Details</span>' : '')
          + '</span>'
        : (d.accom.key ? '<span class="accom-note"><span class="accom-details-link" onclick="toggleDetailsPanel(this)" data-key="' + d.accom.key + '">Details</span></span>' : ''))
      + '</div>'
      + (d.accom.key ? '<div class="details-panel" data-key="' + d.accom.key + '"></div>' : '')
      + '</section>';
  });
  window._MDATA = MDATA;
}

function initMaps() {
  var obs = new IntersectionObserver(function(entries) {
    entries.forEach(function(e) {
      if (e.isIntersecting && !e.target.dataset.init) {
        e.target.dataset.init = "1";
        var el = e.target;
        var lt = parseFloat(el.dataset.lat), ln = parseFloat(el.dataset.lng), zm = parseInt(el.dataset.zoom);
        var ms = (window._MDATA && window._MDATA[el.id]) || [];
        var m = L.map(el, {center:[lt,ln],zoom:zm,zoomControl:false,scrollWheelZoom:false,attributionControl:false,dragging:false});
        L.tileLayer("https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png",{subdomains:"abcd",maxZoom:19}).addTo(m);
        ms.forEach(function(mk) {
          var ic = L.divIcon({html:'<div style="width:10px;height:10px;border-radius:50%;background:'+mk.c+';border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.35)"></div>',iconSize:[10,10],iconAnchor:[5,5],className:""});
          L.marker([mk.lat,mk.lng],{icon:ic}).addTo(m).bindTooltip(mk.label,{permanent:false,direction:"top",offset:[0,-8]});
        });
        if (ms.length > 1) {
          L.polyline(ms.map(function(mk){return[mk.lat,mk.lng];}),{color:ms[0].c,weight:1.5,opacity:.4,dashArray:"5 4"}).addTo(m);
        }
      }
    });
  }, {rootMargin:"400px 0px"});
  document.querySelectorAll(".day-map").forEach(function(el){obs.observe(el);});
}

function initSpy() {
  var obs = new IntersectionObserver(function(entries) {
    entries.forEach(function(e) {
      if (e.isIntersecting) {
        var id = e.target.id;
        document.querySelectorAll(".top-nav-day").forEach(function(el){el.classList.remove("active");});
        var match = document.getElementById("tnav-" + id);
        if (match) { match.classList.add("active"); match.scrollIntoView({block:"nearest",inline:"center"}); }
      }
    });
  }, {rootMargin:"-12% 0px -68% 0px"});
  document.querySelectorAll(".day-section").forEach(function(el){obs.observe(el);});
}

function toggleDetailsPanel(link) {
  var section = link.closest(".day-section") || link.closest("section");
  var panel = section.querySelector('.details-panel[data-key="' + link.dataset.key + '"]');
  if (!panel) return;
  if (!panel.dataset.built) {
    var data = _ACCOMDATA[link.dataset.key];
    if (!data) return;
    var html = '<div class="details-panel-inner">';
    data.rows.forEach(function(r) {
      var val = r.map
        ? '<a href="https://www.google.com/maps/search/?api=1&query=' + r.map + '" target="_blank">' + r.val + ' ↗</a>'
        : r.val;
      html += '<div class="details-row">'
        + '<div class="details-icon">' + r.icon + '</div>'
        + '<div class="details-cell">'
          + '<div class="details-lbl">' + r.label + '</div>'
          + '<div class="details-val">' + val + '</div>'
        + '</div></div>';
    });
    html += '</div>';
    panel.innerHTML = html;
    panel.dataset.built = "1";
  }
  if (panel.classList.contains("open")) {
    panel.style.height = panel.scrollHeight + "px";
    void panel.offsetHeight;
    panel.style.height = "0";
    panel.classList.remove("open");
  } else {
    panel.classList.add("open");
    panel.style.height = panel.scrollHeight + "px";
    panel.addEventListener("transitionend", function handler() {
      if (panel.classList.contains("open")) panel.style.height = "auto";
      panel.removeEventListener("transitionend", handler);
    });
  }
}
function goDay(id){var el=document.getElementById(id);if(el){el.scrollIntoView({behavior:"smooth",block:"start"});document.querySelectorAll(".top-nav-day").forEach(function(n){n.classList.remove("active");});var m=document.getElementById("tnav-"+id);if(m){m.classList.add("active");m.scrollIntoView({block:"nearest",inline:"center"});}}}
function goTo(id){var el=document.getElementById(id);if(el)el.scrollIntoView({behavior:"smooth",block:"start"});}
function openGoogleMaps(lat,lng){window.open("https://www.google.com/maps/search/?api=1&query="+lat+","+lng,"_blank");}


function toggleRecsPanel(bar) {
  var panel = bar.nextElementSibling;
  if (!panel) return;
  if (panel.classList.contains("open")) {
    panel.style.height = panel.scrollHeight + "px";
    void panel.offsetHeight;
    panel.style.height = "0";
    panel.classList.remove("open");
    bar.classList.remove("open");
  } else {
    panel.classList.add("open");
    bar.classList.add("open");
    panel.style.height = panel.scrollHeight + "px";
    panel.addEventListener("transitionend", function handler() {
      if (panel.classList.contains("open")) panel.style.height = "auto";
      panel.removeEventListener("transitionend", handler);
    });
  }
}

function switchRecTab(tab) {
  var tabs = tab.parentElement;
  var panel = tabs.parentElement;
  tabs.querySelectorAll(".recs-tab").forEach(function(t){ t.classList.remove("active"); });
  tab.classList.add("active");
  panel.querySelectorAll(".recs-tab-content").forEach(function(c){ c.classList.remove("active"); });
  var target = document.getElementById("rtc-" + tab.dataset.tab);
  if (target) target.classList.add("active");
}

buildTopNav();
buildDays();
var TRIP_YEAR = 2026;
var WX_ICONS = {0:"☀️",1:"🌤️",2:"⛅",3:"☁️",45:"🌫️",48:"🌫️",51:"🌦️",53:"🌦️",55:"🌧️",61:"🌧️",63:"🌧️",65:"🌧️",71:"🌨️",73:"🌨️",75:"🌨️",80:"🌦️",81:"🌧️",82:"🌧️",95:"⛈️",96:"⛈️",99:"⛈️"};
var WX_DESC = {0:"Clear",1:"Mostly clear",2:"Partly cloudy",3:"Overcast",45:"Fog",48:"Fog",51:"Light drizzle",53:"Drizzle",55:"Heavy drizzle",61:"Light rain",63:"Rain",65:"Heavy rain",71:"Light snow",73:"Snow",75:"Heavy snow",80:"Showers",81:"Showers",82:"Heavy showers",95:"Thunderstorm",96:"Thunderstorm",99:"Thunderstorm"};

function parseDate(dateStr) {
  var months = {Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
  var pts = dateStr.split(" ");
  return new Date(TRIP_YEAR, months[pts[1]], parseInt(pts[2]));
}

function toISO(d) {
  return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
}

function fetchWeather() {
  var locs = {};
  DAYS.forEach(function(d) {
    var key = d.lat + "," + d.lng;
    if (!locs[key]) locs[key] = [];
    locs[key].push(d);
  });

  Object.keys(locs).forEach(function(key) {
    var days = locs[key];
    var lat = days[0].lat, lng = days[0].lng;
    var dates = days.map(function(d) { return parseDate(d.date); });
    var minDate = toISO(new Date(Math.min.apply(null, dates)));
    var maxDate = toISO(new Date(Math.max.apply(null, dates)));
    var tz = lng > 0 ? "Europe/Athens" : "America/New_York";

    var currentUrl = "https://api.open-meteo.com/v1/forecast"
      + "?latitude=" + lat + "&longitude=" + lng
      + "&current=temperature_2m,weather_code"
      + "&temperature_unit=fahrenheit"
      + "&timezone=" + tz;

    var forecastUrl = "https://api.open-meteo.com/v1/forecast"
      + "?latitude=" + lat + "&longitude=" + lng
      + "&daily=temperature_2m_max,temperature_2m_min,weather_code"
      + "&temperature_unit=fahrenheit"
      + "&timezone=" + tz
      + "&start_date=" + minDate + "&end_date=" + maxDate;

    var currentP = fetch(currentUrl).then(function(r) { return r.json(); }).catch(function() { return {}; });
    var forecastP = fetch(forecastUrl).then(function(r) { return r.json(); }).catch(function() { return {}; });

    Promise.all([currentP, forecastP]).then(function(results) {
      var curData = results[0], fData = results[1];
      var current = null;
      if (curData.current) {
        current = {
          temp: Math.round(curData.current.temperature_2m),
          code: curData.current.weather_code
        };
      }
      var dateMap = {};
      if (fData.daily) {
        fData.daily.time.forEach(function(t, i) {
          dateMap[t] = {
            hi: Math.round(fData.daily.temperature_2m_max[i]),
            lo: Math.round(fData.daily.temperature_2m_min[i]),
            code: fData.daily.weather_code[i]
          };
        });
      }
      days.forEach(function(d) {
        var iso = toISO(parseDate(d.date));
        var forecast = dateMap[iso] || null;
        renderWx(d.id, d.date, forecast, current);
      });
    });
  });
}

function renderWx(id, dateStr, forecast, current) {
  var el = document.getElementById("wx-" + id);
  if (!el) return;
  el.classList.remove("loading");
  var html = "";

  if (forecast) {
    var icon = WX_ICONS[forecast.code] || "🌡️";
    var desc = WX_DESC[forecast.code] || "—";
    html += '<span class="wx-forecast-label">Forecast</span>'
      + '<span class="wx-icon">' + icon + '</span>'
      + '<span class="wx-temps"><span class="wx-hi">' + forecast.hi + '°</span>'
      + '<span class="wx-sep">/</span>'
      + '<span class="wx-lo">' + forecast.lo + '°</span></span>'
      + '<span class="wx-desc">' + desc + '</span>';
    if (current) {
      var cIcon = WX_ICONS[current.code] || "🌡️";
      var cDesc = WX_DESC[current.code] || "—";
      html += '<span class="wx-divider">·</span>'
        + '<span class="wx-current"><span class="wx-current-label">Now</span> '
        + cIcon + ' ' + current.temp + '° ' + cDesc + '</span>';
    }
  } else if (current) {
    var cIcon = WX_ICONS[current.code] || "🌡️";
    var cDesc = WX_DESC[current.code] || "—";
    html += '<span class="wx-icon">' + cIcon + '</span>'
      + '<span class="wx-current"><span class="wx-current-label">Now</span> '
      + current.temp + '°</span>'
      + '<span class="wx-desc">' + cDesc + '</span>';
    var tripDate = parseDate(dateStr);
    var avail = new Date(tripDate.getTime() - 16 * 86400000);
    var mo = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][avail.getMonth()];
    html += '<span class="wx-divider">·</span>'
      + '<span class="wx-unavail">Forecast available ~' + mo + ' ' + avail.getDate() + '</span>';
  } else {
    html = '<span class="wx-unavail">Weather unavailable</span>';
  }

  el.innerHTML = html;
}

window.addEventListener("load", function(){initMaps();initSpy();fetchWeather();});
</script>
