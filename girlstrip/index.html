<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Girls Trip · May 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500;1,600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<style>
:root {
  --bg: #FFFFFF;
  --surface: #FFFFFF;
  --ink: #0a0a0a;
  --ink-2: #3a3a3a;
  --ink-3: #717171;
  --ink-4: #c0c0c0;
  --border: #EEEEEE;
  --border-2: #D0D0D0;
  --hero-bg: #111111;
  --nav-h: 58px;
  --athens-color: #8C7455;
  --paros-color: #3B8FA3;
  --travel-color: #9A9A9A;
  --heading: "Cormorant Garamond", Georgia, serif;
  --body: "Jost", Helvetica, Arial, sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--body);
  font-weight: 300;
  font-size: 14px;
  line-height: 1.65;
  color: var(--ink-3);
  background: var(--bg);
  margin: 0;
}

/* ━━━━ HERO (black) ━━━━ */
.hero {
  background: var(--hero-bg);
  padding: 52px 0 44px;
}
.hero-inner {
  max-width: 900px;
  margin: 0 auto;
  padding: 0 56px;
  text-align: center;
}
.hero-rule { margin-left: auto; margin-right: auto; }
.hero-pills { justify-content: center; }
.hero-eyebrow {
  font-family: var(--body); font-size: 9px; font-weight: 500;
  letter-spacing: 0.25em; text-transform: uppercase;
  color: #555; margin-bottom: 14px;
}
.hero-title {
  font-family: var(--heading); font-size: 42px; font-weight: 300;
  font-style: italic; color: #fff; letter-spacing: -0.01em;
  line-height: 1.0; margin-bottom: 4px; white-space: nowrap;
}
.hero-title span { font-weight: 400; }
.hero-subtitle {
  font-family: var(--heading); font-size: 18px; font-weight: 300;
  font-style: italic; color: #666; letter-spacing: 0.02em; margin-bottom: 28px;
}
.hero-rule { width: 32px; height: 1px; background: #333; margin-bottom: 22px; }
.hero-pills { display: flex; flex-wrap: wrap; gap: 0; border-top: 1px solid #222; padding-top: 18px; }
.hero-pill {
  font-family: var(--body); font-size: 9px; font-weight: 500;
  letter-spacing: 0.16em; text-transform: uppercase;
  padding: 0 20px 0 0; color: #555;
}
.hero-pill + .hero-pill { border-left: 1px solid #222; padding-left: 20px; }
.hero-pill strong { color: #ccc; font-weight: 500; }

/* ━━━━ TOP NAV ━━━━ */
.top-nav {
  position: sticky; position: -webkit-sticky; top: 0; z-index: 300;
  background: #fff; border-bottom: 1px solid var(--border);
  height: var(--nav-h);
  width: 100%;
  overflow: hidden;
}
.top-nav-wrap {
  display: flex; align-items: stretch;
  max-width: 900px;
  margin: 0 auto;
  height: 100%;
}
.top-nav-inner {
  display: flex; align-items: stretch;
  overflow-x: scroll; scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
  flex: 1; min-width: 0;
  height: 100%;
}
.top-nav-inner::-webkit-scrollbar { display: none; }
.top-nav-day {
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px;
  padding: 0 14px; cursor: pointer; white-space: nowrap;
  border-right: 1px solid var(--border);
  transition: background 0.12s; flex-shrink: 0;
  position: relative;
}
.top-nav-day:hover { background: #FAFAFA; }
.top-nav-day.active { background: #FAFAFA; }
.top-nav-day.active::after {
  content: ''; position: absolute; bottom: 0; left: 0; right: 0;
  height: 2px; background: var(--ink);
}
.top-nav-day.active.phase-athens::after { background: var(--athens-color); }
.top-nav-day.active.phase-paros::after  { background: var(--paros-color); }
.top-nav-num  { font-family: var(--body); font-size: 9px; font-weight: 600; letter-spacing: 0.1em; color: var(--ink-4); }
.top-nav-date { font-family: var(--body); font-size: 10px; font-weight: 400; color: var(--ink-3); }
.top-nav-day.active .top-nav-num,
.top-nav-day.active .top-nav-date { color: var(--ink-2); }

/* ━━━━ MAIN ━━━━ */
.main-wrap { max-width: 900px; margin: 0 auto; width: 100%; }

/* ━━━━ SECTION ━━━━ */
.section-hd { padding: 40px 40px 0; }
.section-rule { width: 32px; height: 1px; background: var(--border-2); margin-bottom: 12px; }
.section-label {
  font-family: var(--body); font-size: 9px; font-weight: 600;
  letter-spacing: 0.22em; text-transform: uppercase; color: var(--ink-4); margin-bottom: 8px;
}
.section-title {
  font-family: var(--heading); font-size: 30px; font-weight: 400;
  color: var(--ink); letter-spacing: -0.01em;
}

/* ━━━━ DAY CARDS ━━━━ */
#days-container { padding: 24px 40px 70vh; display: flex; flex-direction: column; gap: 1px; }

.day-section {
  background: var(--surface);
  border: 1px solid var(--border);
  overflow: hidden;
  isolation: isolate;
  scroll-margin-top: calc(var(--nav-h) + 16px);
}
.day-section + .day-section { border-top: none; }

.phase-athens .day-topbar { border-top: 3px solid var(--athens-color); }
.phase-paros  .day-topbar { border-top: 3px solid var(--paros-color); }
.phase-travel .day-topbar { border-top: 3px solid var(--border-2); }

.day-topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 9px 24px; border-bottom: 1px solid var(--border); background: #FAFAFA;
}
.day-topbar-left { display: flex; align-items: center; gap: 12px; }
.day-counter {
  font-family: var(--body); font-size: 9px; font-weight: 600;
  letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-4);
}
.day-counter-sep { width: 3px; height: 3px; border-radius: 50%; background: var(--border-2); }
.day-weekdate { font-family: var(--body); font-size: 10px; font-weight: 400; letter-spacing: 0.06em; color: var(--ink-3); }
.day-phase-tag {
  font-family: var(--body); font-size: 8px; font-weight: 600;
  letter-spacing: 0.2em; text-transform: uppercase;
  padding: 3px 8px; border: 1px solid var(--border); color: var(--ink-4);
}
.phase-athens .day-phase-tag { color: var(--athens-color); border-color: var(--athens-color); }
.phase-paros  .day-phase-tag { color: var(--paros-color);  border-color: var(--paros-color); }

.day-headline {
  padding: 20px 24px 18px;
  display: flex; align-items: flex-start; justify-content: space-between;
  border-bottom: 1px solid var(--border);
}
.day-title {
  font-family: var(--heading); font-size: 24px; font-weight: 500;
  font-style: normal; letter-spacing: -0.01em; color: var(--ink);
  margin-bottom: 5px; line-height: 1.15;
}
.day-subtitle {
  font-family: var(--body); font-size: 10px; font-weight: 400;
  letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-4);
}
.day-num-bg {
  font-family: var(--heading); font-size: 60px; font-weight: 300;
  color: var(--border); letter-spacing: -0.04em; line-height: 1;
  flex-shrink: 0; user-select: none;
}

.day-body { display: flex; }

.day-content-col { flex: 1; min-width: 0; }
.schedule { display: flex; flex-direction: column; }
.schedule-row {
  display: flex; gap: 16px; padding: 10px 24px;
  border-bottom: 1px solid var(--border); align-items: flex-start;
}
.schedule-row:last-child { border-bottom: none; }
.sched-time {
  font-family: var(--body); font-size: 9px; font-weight: 600;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--ink-4); min-width: 80px; flex-shrink: 0; padding-top: 2px;
}
.sched-main { flex: 1; min-width: 0; }
.sched-main strong { font-weight: 400; font-size: 13px; color: var(--ink-2); display: block; }
.sched-note { font-size: 11px; color: var(--ink-4); display: block; margin-top: 2px; font-weight: 300; }
.flight-row { background: #FAFAFA; }
.flight-row .sched-time { color: var(--ink-2); }
.flight-row .sched-main strong { font-weight: 500; }

.day-map-col {
  width: 200px; flex-shrink: 0;
  border-left: 1px solid var(--border); position: relative;
}
.day-map { width: 100%; height: 100%; min-height: 160px; }
.map-open-btn {
  position: absolute; bottom: 8px; right: 8px;
  font-family: var(--body); font-size: 9px; font-weight: 600;
  letter-spacing: 0.1em; text-transform: uppercase;
  background: rgba(255,255,255,.92); border: 1px solid var(--border);
  padding: 3px 8px; cursor: pointer; color: var(--ink-3);
}

.day-accom {
  display: flex; align-items: center; flex-wrap: wrap; gap: 8px;
  padding: 11px 24px; border-top: 1px solid var(--border);
}
.day-accom.has-modal { cursor: pointer; }
.day-accom.has-modal:hover { background: #FAFAFA; }
.accom-status-text {
  font-family: var(--body); font-size: 8px; font-weight: 600;
  letter-spacing: 0.18em; text-transform: uppercase;
  padding: 2px 6px; border: 1px solid;
}
.booked .accom-status-text { color: #3a7a50; border-color: #b8ddc8; background: #f0faf4; }
.book   .accom-status-text { color: #a04030; border-color: #e8c0ba; background: #fdf5f4; }
.na     .accom-status-text { display: none; }
.accom-sep   { color: var(--border-2); }
.accom-label {
  font-family: var(--body); font-size: 9px; font-weight: 600;
  letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-4);
}
.accom-name  { font-family: var(--body); font-size: 13px; font-weight: 300; color: var(--ink-2); }
.accom-note  { font-size: 11px; color: var(--ink-4); flex: 1 0 100%; margin-top: 2px; }
.accom-detail-hint {
  font-family: var(--body); font-size: 9px; font-weight: 600;
  letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-4); margin-left: auto;
}
.accom-detail-hint:hover { color: var(--ink); }

/* ━━━━ MODAL ━━━━ */
.accom-modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.4); z-index: 1000;
  align-items: center; justify-content: center; padding: 20px;
}
.accom-modal-overlay.open { display: flex; }
.accom-modal {
  background: var(--surface); width: 100%; max-width: 460px;
  max-height: 80vh; overflow-y: auto;
  box-shadow: 0 8px 40px rgba(0,0,0,.15); border: 1px solid var(--border);
}
.accom-modal-hd {
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 24px 16px; border-bottom: 1px solid var(--border);
  position: sticky; top: 0; background: var(--surface); z-index: 10;
}
.accom-modal-title {
  font-family: var(--heading); font-size: 18px; font-weight: 500; color: var(--ink);
}
.accom-modal-close {
  font-family: var(--body); font-size: 9px; font-weight: 600;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--ink-4); cursor: pointer; border: none; background: none;
}
.accom-modal-body { padding: 8px 0 16px; }
.accom-modal-row {
  display: flex; gap: 14px; padding: 11px 24px;
  border-bottom: 1px solid var(--border); align-items: flex-start;
}
.accom-modal-row:last-child { border-bottom: none; }
.accom-modal-icon { font-size: 14px; flex-shrink: 0; width: 20px; text-align: center; padding-top: 1px; }
.accom-modal-cell { flex: 1; }
.accom-modal-lbl {
  font-family: var(--body); font-size: 8px; font-weight: 600;
  letter-spacing: 0.2em; text-transform: uppercase; color: var(--ink-4); margin-bottom: 3px;
}
.accom-modal-val { font-size: 13px; color: var(--ink-2); font-weight: 300; line-height: 1.5; }
.accom-modal-val a { color: var(--ink); text-decoration: underline; text-underline-offset: 2px; }

/* ━━━━ RESPONSIVE ━━━━ */
@media (max-width: 768px) {
  .hero { padding: 36px 24px 18px; }
  .hero-title { font-size: 32px; white-space: normal; }
  .hero-subtitle { font-size: 15px; }
  .hero-pills { display: none; }
  .section-hd { padding: 28px 20px 0; }
  #days-container { padding: 16px 12px 70vh; }
  .day-map-col { display: none; }
  .day-headline { padding: 16px 16px 14px; }
  .day-num-bg { font-size: 44px; }
  .day-title { font-size: 20px; }
  .schedule-row { padding: 9px 16px; }
  .day-topbar { padding: 8px 16px; }
  .day-accom { padding: 10px 16px; flex-wrap: wrap; }
  .day-section { max-width: 100%; }
  .sched-time { min-width: 64px; }
  .sched-main strong, .sched-note { word-break: break-word; }
  .top-nav-day { padding: 0 14px; }
  #pw-row { flex-direction: column; gap: 10px; }
  #pw-input { width: 220px; max-width: 80vw; }
  #pw-submit { padding: 12px 28px; height: 44px; }
  .recs-label-full { display: none; }
  .recs-label-short { display: inline !important; }
  .recs-toggle { flex-direction: column; gap: 0; justify-content: center; padding: 0 12px; }
  .recs-label-short { line-height: 1; margin-bottom: 2px; }
  body { font-size: 16px; color: #555; }
  .hero-eyebrow { font-size: 11px; }
  .day-counter { font-size: 11px; }
  .day-weekdate { font-size: 13px; color: #555; }
  .day-phase-tag { font-size: 11px; }
  .day-title { font-size: 24px; }
  .day-subtitle { font-size: 13px; color: #888; }
  .sched-time { font-size: 12px; color: #888; }
  .sched-main strong { font-size: 16px; }
  .sched-note { font-size: 14px; color: #777; }
  .accom-status-text { font-size: 11px; }
  .accom-label { font-size: 12px; color: #888; }
  .accom-name { font-size: 16px; }
  .accom-note { font-size: 14px; color: #777; }
  .accom-detail-hint { font-size: 12px; }
  .accom-sep { color: #999; }
  .top-nav-num { font-size: 12px; }
  .top-nav-date { font-size: 13px; }
  .recs-hd { font-size: 11px; }
  .rec-cat { font-size: 11px; color: #888; }
  .rec-text { font-size: 16px; }
  .rec-note { font-size: 14px; color: #777; }
  .day-counter-sep { background: #999; }
}
.recs-label-short { display: none; }

/* ━━━━ PASSWORD GATE ━━━━ */
#pw-gate {
  position: fixed; inset: 0; z-index: 9999;
  background: #111111;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 20px;
  overflow: hidden;
  min-height: 100vh; min-height: 100dvh;
}
#pw-gate-title {
  font-family: var(--heading); font-size: 36px; font-weight: 300;
  font-style: italic; color: #fff; letter-spacing: -0.01em;
}
#pw-gate-form { display: flex; flex-direction: column; align-items: center; gap: 12px; }
#pw-row { display: flex; align-items: stretch; gap: 12px; max-width: 90vw; }
#pw-input {
  background: transparent; border: 1px solid #444;
  color: #fff; font-family: var(--body); font-size: 16px; font-weight: 300;
  letter-spacing: 0.12em; text-align: center; padding: 9px 20px;
  width: 220px; max-width: 60vw; outline: none;
}
#pw-input::placeholder { color: #555; letter-spacing: 0.18em; text-transform: uppercase; font-size: 10px; }
#pw-error {
  font-family: var(--body); font-size: 10px; letter-spacing: 0.12em;
  text-transform: uppercase; color: #c0392b; display: none;
}
#pw-submit {
  background: transparent; border: 1px solid #444; color: #aaa;
  font-family: var(--body); font-size: 9px; font-weight: 500;
  letter-spacing: 0.2em; text-transform: uppercase;
  padding: 0 28px; cursor: pointer; align-self: stretch;
  transition: border-color 0.15s, color 0.15s;
}
#pw-submit:hover { border-color: #aaa; color: #fff; }

/* ━━━━ RECOMMENDATIONS ━━━━ */
.day-recs { display: none; border-top: 1px solid var(--border); padding: 20px 24px 22px; }
body.show-recs .day-recs { display: block; }
.recs-hd { font-family: var(--body); font-size: 8px; font-weight: 600; letter-spacing: 0.2em; text-transform: uppercase; color: var(--ink-4); margin-bottom: 14px; }
.recs-grid { display: flex; flex-direction: column; gap: 8px; }
.rec-item { display: flex; gap: 12px; align-items: baseline; }
.rec-cat { font-family: var(--body); font-size: 8px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-4); min-width: 36px; flex-shrink: 0; padding-top: 1px; }
.rec-body { display: flex; flex-wrap: wrap; align-items: baseline; gap: 0 6px; }
.rec-text { font-family: var(--body); font-size: 13px; font-weight: 400; color: var(--ink-2); }
.rec-note { font-family: var(--body); font-size: 11px; font-weight: 300; color: var(--ink-3); }

/* toggle pill — lives at right end of top nav */
.recs-toggle {
  display: flex; align-items: center; gap: 9px;
  padding: 0 20px; cursor: pointer; flex-shrink: 0;
  border-left: 1px solid var(--border);
  font-family: var(--body); font-size: 9px; font-weight: 500;
  letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-3);
  white-space: nowrap; user-select: none;
  background: #fff; color: var(--ink-4);
}
.recs-toggle:hover { background: #FAFAFA; }
.recs-switch {
  width: 26px; height: 14px; border-radius: 7px;
  background: var(--border-2); position: relative;
  transition: background 0.18s; flex-shrink: 0;
}
.recs-switch::after {
  content: ''; position: absolute; top: 2px; left: 2px;
  width: 10px; height: 10px; border-radius: 50%;
  background: #fff; transition: transform 0.18s;
  box-shadow: 0 1px 3px rgba(0,0,0,.25);
}
body.show-recs .recs-switch { background: var(--ink); }
body.show-recs .recs-switch::after { transform: translateX(12px); }
</style>
<script>
(function(){
  var KEY = "gt_auth";
  var HASH = "5a5c9cd4f5e8b2a3d7e6f1c0b9a8d2e4"; /* md5-ish placeholder replaced below */
  function check(pw){ return pw.toLowerCase() === "greece"; }
  function unlock(){ document.getElementById("pw-gate").style.display="none"; sessionStorage.setItem(KEY,"1"); }
  window.addEventListener("DOMContentLoaded", function(){
    if(sessionStorage.getItem(KEY)==="1"){ unlock(); return; }
    document.getElementById("pw-form").addEventListener("submit", function(e){
      e.preventDefault();
      var v = document.getElementById("pw-input").value;
      if(check(v)){ unlock(); }
      else {
        var err = document.getElementById("pw-error");
        err.style.display="block";
        document.getElementById("pw-input").value="";
      }
    });
  });
})();
</script>
</head>
<body>

<!-- PASSWORD GATE -->
<div id="pw-gate">
  <div id="pw-gate-title">Girls Trip</div>
  <form id="pw-form" id="pw-gate-form">
    <div id="pw-row">
      <input id="pw-input" type="password" placeholder="password" autocomplete="off">
      <button id="pw-submit" type="submit">Enter</button>
    </div>
    <div id="pw-error">Incorrect password</div>
  </form>
</div>

<!-- HERO -->
<div class="hero">
  <div class="hero-inner">
    <div class="hero-eyebrow">May 12 &ndash; 20 &middot; 2026 &middot; 9 Days</div>
    <div class="hero-title">Girls Trip <span>to Greece</span></div>
    <div class="hero-subtitle">Athens &middot; Paros &middot; Naousa</div>
    <div class="hero-pills">
      <span class="hero-pill"><strong>2</strong>&nbsp; SAS Flights</span>
      <span class="hero-pill"><strong>2 Nights</strong>&nbsp; Athens</span>
      <span class="hero-pill"><strong>4 Nights</strong>&nbsp; Paros</span>
      <span class="hero-pill"><strong>1 Night</strong>&nbsp; Airport</span>
    </div>
  </div>
</div>

<!-- TOP NAV -->
<nav class="top-nav" id="top-nav">
  <div class="top-nav-wrap">
    <div class="top-nav-inner" id="top-nav-inner"></div>
    <div class="recs-toggle" id="recs-toggle" onclick="toggleRecs()">
      <span class="recs-label-full">Recommendations</span>
      <span class="recs-label-short">Recos</span>
      <span class="recs-switch"></span>
    </div>
  </div>
</nav>

<!-- MAIN -->
<div class="main-wrap">

  <!-- DAYS -->
  <div class="section-wrap" id="days">
    <div id="days-container"></div>
  </div>

</div>

<!-- HOTEL MODAL -->
<div class="accom-modal-overlay" id="accom-modal-overlay" onclick="closeAccomModal(event)">
  <div class="accom-modal">
    <div class="accom-modal-hd">
      <div class="accom-modal-title" id="accom-modal-title"></div>
      <button class="accom-modal-close" onclick="closeAccomModal()">&#x2715;</button>
    </div>
    <div class="accom-modal-body" id="accom-modal-body"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

function buildTopNav() {
  var c = document.getElementById("top-nav-inner");
  DAYS.forEach(function(d) {
    var p = PM[d.phase] || PM.travel;
    var el = document.createElement("div");
    el.className = "top-nav-day " + p.sc;
    el.id = "tnav-" + d.id;
    el.onclick = function() { goDay(d.id); };
    var pts = d.date.split(" ");
    el.innerHTML = '<span class="top-nav-num">' + String(d.num).padStart(2,"0") + '</span>'
      + '<span class="top-nav-date">' + pts[1] + ' ' + pts[2] + '</span>';
    c.appendChild(el);
  });
}

function buildDays() {
  var MDATA = {};
  var c = document.getElementById("days-container");
  DAYS.forEach(function(d) {
    var p = PM[d.phase] || PM.travel;
    var st = SM[d.accom.status] || SM.na;
    MDATA["map-" + d.id] = d.markers;
    var rows = d.schedule.map(function(s) {
      var isFlight = s.time.match(/^\d{2}:\d{2}$/) || s.desc.toLowerCase().indexOf('airline') > -1 || s.desc.toLowerCase().indexOf('depart') > -1 || s.desc.toLowerCase().indexOf('arrive') > -1;
      return '<div class="schedule-row' + (isFlight ? ' flight-row' : '') + '">'
        + '<div class="sched-time">' + s.time + '</div>'
        + '<div class="sched-main"><strong>' + s.desc + '</strong>'
        + (s.note ? '<span class="sched-note">' + s.note + '</span>' : '')
        + '</div></div>';
    }).join("");
    c.innerHTML += '<section class="day-section ' + p.cls + '" id="' + d.id + '">'
      + '<div class="day-topbar">'
        + '<div class="day-topbar-left">'
          + '<span class="day-counter">Day ' + String(d.num).padStart(2,"0") + ' / 9</span>'
          + '<span class="day-counter-sep"></span>'
          + '<span class="day-weekdate">' + d.date + '</span>'
        + '</div>'
        + '<span class="day-phase-tag">' + p.tag + '</span>'
      + '</div>'
      + '<div class="day-headline">'
        + '<div>'
          + '<div class="day-title">' + d.title + '</div>'
          + '<div class="day-subtitle">' + d.subtitle + '</div>'
        + '</div>'
        + '<div class="day-num-bg">' + String(d.num).padStart(2,"0") + '</div>'
      + '</div>'
      + '<div class="day-body">'
        + '<div class="day-content-col"><div class="schedule">' + rows + '</div></div>'
        + '<div class="day-map-col"><div style="position:relative;height:100%">'
          + '<div class="day-map" id="map-' + d.id + '" data-lat="' + d.lat + '" data-lng="' + d.lng + '" data-zoom="' + d.zoom + '" style="cursor:pointer" onclick="openGoogleMaps(' + d.lat + ',' + d.lng + ')"></div>'
          + '<span class="map-open-btn" onclick="openGoogleMaps(' + d.lat + ',' + d.lng + ')">&#8599;&nbsp;Expand</span>'
        + '</div></div>'
      + '</div>'
      + (d.accom.key
          ? '<div class="day-accom ' + st.c + ' has-modal" onclick="openAccomModal(\'' + d.accom.key + '\')">'
          : '<div class="day-accom ' + st.c + '">')
      + '<span class="accom-status-text">' + st.text + '</span>'
      + (d.accom.label ? '<span class="accom-sep">&middot;</span><span class="accom-label">' + d.accom.label + '</span>' : '')
      + (d.accom.name  ? '<span class="accom-name">' + d.accom.name + '</span>' : '')
      + (d.accom.note  ? '<span class="accom-note">' + d.accom.note + '</span>' : '')
      + (d.accom.key   ? '<span class="accom-detail-hint">Details &rsaquo;</span>' : '')
      + '</div>'
      + (d.recs && d.recs.length
          ? '<div class="day-recs"><div class="recs-hd">Recommendations</div><div class="recs-grid">'
            + d.recs.map(function(r){
                return '<div class="rec-item"><span class="rec-cat">' + r.cat + '</span>'
                  + '<span class="rec-body"><span class="rec-text">' + r.text + '</span>'
                  + (r.note ? '<span class="rec-note">— ' + r.note + '</span>' : '')
                  + '</span></div>';
              }).join("")
            + '</div></div>'
          : '')
      + '</section>';
  });
  window._MDATA = MDATA;
}

function initMaps() {
  var obs = new IntersectionObserver(function(entries) {
    entries.forEach(function(e) {
      if (e.isIntersecting && !e.target.dataset.init) {
        e.target.dataset.init = "1";
        var el = e.target;
        var lt = parseFloat(el.dataset.lat), ln = parseFloat(el.dataset.lng), zm = parseInt(el.dataset.zoom);
        var ms = (window._MDATA && window._MDATA[el.id]) || [];
        var m = L.map(el, {center:[lt,ln],zoom:zm,zoomControl:false,scrollWheelZoom:false,attributionControl:false,dragging:false});
        L.tileLayer("https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png",{subdomains:"abcd",maxZoom:19}).addTo(m);
        ms.forEach(function(mk) {
          var ic = L.divIcon({html:'<div style="width:10px;height:10px;border-radius:50%;background:'+mk.c+';border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.35)"></div>',iconSize:[10,10],iconAnchor:[5,5],className:""});
          L.marker([mk.lat,mk.lng],{icon:ic}).addTo(m).bindTooltip(mk.label,{permanent:false,direction:"top",offset:[0,-8]});
        });
        if (ms.length > 1) {
          L.polyline(ms.map(function(mk){return[mk.lat,mk.lng];}),{color:ms[0].c,weight:1.5,opacity:.4,dashArray:"5 4"}).addTo(m);
        }
      }
    });
  }, {rootMargin:"400px 0px"});
  document.querySelectorAll(".day-map").forEach(function(el){obs.observe(el);});
}

function initSpy() {
  var obs = new IntersectionObserver(function(entries) {
    entries.forEach(function(e) {
      if (e.isIntersecting) {
        var id = e.target.id;
        document.querySelectorAll(".top-nav-day").forEach(function(el){el.classList.remove("active");});
        var match = document.getElementById("tnav-" + id);
        if (match) { match.classList.add("active"); match.scrollIntoView({block:"nearest",inline:"center"}); }
      }
    });
  }, {rootMargin:"-12% 0px -68% 0px"});
  document.querySelectorAll(".day-section").forEach(function(el){obs.observe(el);});
}

function openAccomModal(key) {
  var data = _ACCOMDATA[key];
  if (!data) return;
  document.getElementById("accom-modal-title").textContent = data.title;
  var body = "";
  data.rows.forEach(function(r) {
    var val = r.map
      ? '<a href="https://www.google.com/maps/search/?api=1&query=' + r.map + '" target="_blank">' + r.val + ' ↗</a>'
      : r.val;
    body += '<div class="accom-modal-row">'
      + '<div class="accom-modal-icon">' + r.icon + '</div>'
      + '<div class="accom-modal-cell">'
        + '<div class="accom-modal-lbl">' + r.label + '</div>'
        + '<div class="accom-modal-val">' + val + '</div>'
      + '</div></div>';
  });
  document.getElementById("accom-modal-body").innerHTML = body;
  document.getElementById("accom-modal-overlay").classList.add("open");
  document.body.style.overflow = "hidden";
}

function closeAccomModal(e) {
  if (e && e.target !== document.getElementById("accom-modal-overlay")) return;
  document.getElementById("accom-modal-overlay").classList.remove("open");
  document.body.style.overflow = "";
}

document.addEventListener("keydown", function(e){if(e.key==="Escape")closeAccomModal();});
function goDay(id){var el=document.getElementById(id);if(el){el.scrollIntoView({behavior:"smooth",block:"start"});document.querySelectorAll(".top-nav-day").forEach(function(n){n.classList.remove("active");});var m=document.getElementById("tnav-"+id);if(m){m.classList.add("active");m.scrollIntoView({block:"nearest",inline:"center"});}}}
function goTo(id){var el=document.getElementById(id);if(el)el.scrollIntoView({behavior:"smooth",block:"start"});}
function openGoogleMaps(lat,lng){window.open("https://www.google.com/maps/search/?api=1&query="+lat+","+lng,"_blank");}


function toggleRecs() {
  var on = document.body.classList.toggle("show-recs");
  localStorage.setItem("gt_recs", on ? "1" : "0");
}

buildTopNav();
buildDays();
if(localStorage.getItem('gt_recs')==='1'){document.body.classList.add('show-recs');}
window.addEventListener("load", function(){initMaps();initSpy();});
